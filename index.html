<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xiaomi 12 Bootloader Kilidi</title>
    <!-- Google Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f4f7;
            --text-color: #2c3e50;
            --card-bg: #ffffff;
            --accent-color: #ff6700;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            --toggle-btn-bg: #2c3e50;
            --toggle-btn-text: #ffffff;
        }

        [data-theme="dark"] {
            --bg-color: #121214;
            --text-color: #f4f4f7;
            --card-bg: #1e1e24;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            --toggle-btn-bg: #ffffff;
            --toggle-btn-text: #121214;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: background-color 0.3s, color 0.3s;
        }

        body {
            font-family: 'Mi Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .content-wrapper {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            text-align: center;
            max-width: 500px;
            width: 100%;
            border: 1px solid rgba(128, 128, 128, 0.1);
            position: relative;
        }

        .phone-image {
            max-width: 80%;
            height: auto;
            margin-bottom: 20px;
            pointer-events: none;
            user-select: none;
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 50%;
            background-color: var(--toggle-btn-bg);
            color: var(--toggle-btn-text);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            /* Animasyonlar kaldırıldı */
        }

        h1 { margin-bottom: 25px; line-height: 1.2; text-align: center; }
        .main-title { display: block; font-size: 2.2rem; font-weight: 800; color: var(--text-color); }
        .sub-title { display: block; font-size: 1.4rem; font-weight: 500; opacity: 0.7; margin-top: 5px; }
        
        .countdown-wrapper { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 20px;}
        .countdown-box { background: rgba(255, 103, 0, 0.05); border: 1px solid rgba(255, 103, 0, 0.1); padding: 15px 5px; border-radius: 16px; }
        .number { font-size: 1.8rem; font-weight: 800; color: var(--accent-color); display: block; }
        .label { font-size: 0.7rem; text-transform: uppercase; opacity: 0.7; display: block; margin-top: 5px; }

        @media (max-width: 480px) { .countdown-wrapper { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

    <div class="content-wrapper">
        <button class="theme-toggle" id="themeToggle">
            <span class="material-icons" id="themeIcon">dark_mode</span>
        </button>

        <h1>
            <span class="main-title">Xiaomi 12</span>
            <span class="sub-title">Bootloader Kilidi</span>
        </h1>
        <img src="https://i01.appmifile.com/webfile/globalimg/products/responsive/xiaomi-12/pc-specs-image.png" alt="Xiaomi 12" class="phone-image">
        
        <div class="countdown-wrapper">
            <div class="countdown-box"><span class="number" id="days">00</span><span class="label">Gün</span></div>
            <div class="countdown-box"><span class="number" id="hours">00</span><span class="label">Saat</span></div>
            <div class="countdown-box"><span class="number" id="minutes">00</span><span class="label">Dakika</span></div>
            <div class="countdown-box"><span class="number" id="seconds">00</span><span class="label">Saniye</span></div>
        </div>
    </div>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        
        function applyTheme(theme) {
            if (theme === 'dark') {
                document.body.setAttribute('data-theme', 'dark');
                themeIcon.textContent = 'light_mode';
            } else {
                document.body.removeAttribute('data-theme');
                themeIcon.textContent = 'dark_mode';
            }
            localStorage.setItem('theme', theme);
        }

        const savedTheme = localStorage.getItem('theme') || 'light';
        applyTheme(savedTheme);

        themeToggle.addEventListener('click', () => {
            const current = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            applyTheme(current);
        });

        function getNextSunday() {
            const now = new Date();
            const date = new Date();
            date.setDate(now.getDate() + (7 - now.getDay()) % 7);
            date.setHours(0, 0, 0, 0);
            if (date <= now) date.setDate(date.getDate() + 7);
            return date.getTime();
        }

        let target = getNextSunday();
        setInterval(() => {
            const now = new Date().getTime();
            const dist = target - now;
            if (dist < 0) { target = getNextSunday(); return; }

            document.getElementById("days").textContent = Math.floor(dist / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
            document.getElementById("hours").textContent = Math.floor((dist % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
            document.getElementById("minutes").textContent = Math.floor((dist % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            document.getElementById("seconds").textContent = Math.floor((dist % (1000 * 60)) / 1000).toString().padStart(2, '0');
        }, 1000);
    </script>
</body>
</html>
